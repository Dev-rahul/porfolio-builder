backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/images" # Media files will be stored in the repo under public/images
public_folder: "/images" # The src attribute for uploaded media will begin with /images

collections:
  - name: "portfolio"
    label: "Portfolio Settings"
    files:
      - name: "settings"
        label: "General Settings"
        file: "content/portfolio.json"
        description: "General portfolio settings and information"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Bio", name: "bio", widget: "text"}
          - {label: "Profile Image", name: "profileImage", widget: "image"}
          - {label: "Email", name: "email", widget: "string"}
          - label: "Social Links"
            name: "socialLinks"
            widget: "list"
            fields:
              - {label: "Platform", name: "platform", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
          - {label: "Theme", name: "theme", widget: "select", options: ["minimal", "modern", "developer"], default: "minimal"}
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - {label: "Category", name: "category", widget: "string"}
              - label: "Items"
                name: "items"
                widget: "list"
                field: {label: "Skill", name: "skill", widget: "string"}
          - label: "Experience"
            name: "experience"
            widget: "list"
            fields:
              - {label: "Company", name: "company", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Duration", name: "duration", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - label: "Tech Stack"
        name: "techStack"
        widget: "list"
        field: {label: "Tech", name: "tech", widget: "string"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Live Link", name: "liveLink", widget: "string", required: false}
      - {label: "GitHub Link", name: "githubLink", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown", required: false}
